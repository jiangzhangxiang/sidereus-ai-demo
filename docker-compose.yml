version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: demo-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: demo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
